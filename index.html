<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hyatt House Galleria - Staff Schedule</title>
<style>
  :root {
    --navy: #1C355E;
    --cream: #F5F0E8;
    --green: #5A7F71;
    --border: #D8D0C4;
    --error: #C0392B;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: -apple-system, "Segoe UI", system-ui, Roboto, sans-serif;
    background: var(--cream);
    color: #2b2b2b;
  }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .gate-card {
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 26px;
    max-width: 360px;
    width: 100%;
    text-align: center;
    box-shadow: 0 4px 18px rgba(28, 53, 94, 0.08);
  }
  .gate-card .badge {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--navy);
    color: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 14px;
    font-size: 1.4rem;
  }
  .gate-card h1 {
    color: var(--navy);
    font-size: 1.08rem;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .gate-card p.sub {
    color: #8a8a8a;
    font-size: 0.82rem;
    margin-bottom: 22px;
    line-height: 1.4;
  }
  .gate-card input[type="password"] {
    width: 100%;
    padding: 11px 13px;
    border: 1.5px solid var(--border);
    border-radius: 9px;
    font-size: 0.95rem;
    margin-bottom: 14px;
    outline: none;
    background: var(--cream);
    color: #2b2b2b;
  }
  .gate-card input[type="password"]:focus {
    border-color: var(--green);
  }
  .gate-card button {
    width: 100%;
    padding: 11px;
    border: none;
    border-radius: 9px;
    background: var(--navy);
    color: #fff;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    transition: opacity 0.15s ease;
  }
  .gate-card button:disabled {
    opacity: 0.6;
    cursor: default;
  }
  .remember-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    margin: 14px 0 18px;
    font-size: 0.8rem;
    color: #6b6b6b;
  }
  .remember-row input {
    width: 15px;
    height: 15px;
  }
  .msg {
    font-size: 0.82rem;
    margin-bottom: 12px;
    display: none;
    border-radius: 8px;
    padding: 8px 10px;
  }
  .msg.error {
    color: var(--error);
    background: rgba(192, 57, 43, 0.08);
  }
  .msg.info {
    color: var(--navy);
    background: rgba(28, 53, 94, 0.06);
  }
  .footer-note {
    margin-top: 18px;
    font-size: 0.72rem;
    color: #b3b3b3;
  }
</style>
</head>
<body>
  <div class="gate-card" id="gate-card">
    <div class="badge">&#127968;</div>
    <h1>Hyatt House Galleria</h1>
    <p class="sub">Enter the password to view the staff schedule</p>

    <div class="msg error" id="error-msg">Incorrect password. Please try again.</div>
    <div class="msg info" id="info-msg">Checking&hellip;</div>

    <input type="password" id="pw-input" placeholder="Password" autocomplete="current-password" />

    <div class="remember-row">
      <input type="checkbox" id="remember-cb" checked />
      <label for="remember-cb">Remember me on this device for 30 days</label>
    </div>

    <button id="submit-btn" type="button">View Schedule</button>

    <div class="footer-note">Staff use only</div>
  </div>

  var ITERATIONS = 200000;
  var MAGIC = "STATICRYPT_V1::";
  var STORAGE_KEY = "hhg_sched_pw_v1";
  var REMEMBER_DAYS = 30;

  function b64ToBytes(b64) {
    var bin = atob(b64);
    var bytes = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return bytes;
  }

  function tryDecrypt(password) {
    var salt = b64ToBytes(SALT_B64);
    var iv = b64ToBytes(IV_B64);
    var ciphertext = b64ToBytes(CIPHERTEXT_B64);
    var enc = new TextEncoder();

    return crypto.subtle.importKey(
      "raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]
    ).then(function (keyMaterial) {
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: salt, iterations: ITERATIONS, hash: "SHA-256" },
        keyMaterial,
        { name: "AES-CBC", length: 256 },
        false,
        ["decrypt"]
      );
    }).then(function (key) {
      return crypto.subtle.decrypt({ name: "AES-CBC", iv: iv }, key, ciphertext);
    }).then(function (plainBuf) {
      var text = new TextDecoder().decode(plainBuf);
      if (text.indexOf(MAGIC) !== 0) {
        throw new Error("bad-password");
      }
      return text.slice(MAGIC.length);
    });
  }

  function render(html) {
    document.open();
    document.write(html);
    document.close();
  }

  function showError() {
    document.getElementById("error-msg").style.display = "block";
    document.getElementById("info-msg").style.display = "none";
    var btn = document.getElementById("submit-btn");
    if (btn) btn.disabled = false;
  }

  function submit() {
    var pwInput = document.getElementById("pw-input");
    var pw = pwInput.value;
    if (!pw) return;

    document.getElementById("submit-btn").disabled = true;
    document.getElementById("error-msg").style.display = "none";
    var info = document.getElementById("info-msg");
    info.textContent = "Checking…";
    info.style.display = "block";

    tryDecrypt(pw).then(function (html) {
      var rememberCb = document.getElementById("remember-cb");
      if (rememberCb && rememberCb.checked) {
        var record = { pw: btoa(pw), exp: Date.now() + REMEMBER_DAYS * 86400000 };
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(record)); } catch (e) {}
      } else {
        try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
      }
      render(html);
    }).catch(function () {
      showError();
    });
  }

  function init() {
    var btn = document.getElementById("submit-btn");
    var pwInput = document.getElementById("pw-input");
    if (!btn || !pwInput) return; // page already replaced via document.write()
    btn.addEventListener("click", submit);
    pwInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter") submit();
    });

    // Try a remembered password first (silent auto-unlock).
    var raw;
    try { raw = localStorage.getItem(STORAGE_KEY); } catch (e) { raw = null; }

    if (raw) {
      var record;
      try { record = JSON.parse(raw); } catch (e) { record = null; }

      if (record && record.pw && record.exp && Date.now() < record.exp) {
        var info = document.getElementById("info-msg");
        info.textContent = "Checking…";
        info.style.display = "block";
        btn.disabled = true;

        var pw = atob(record.pw);
        tryDecrypt(pw).then(function (html) {
          render(html);
        }).catch(function () {
          try { localStorage.removeItem(STORAGE_KEY); } catch (e2) {}
          info.style.display = "none";
          btn.disabled = false;
        });
      } else {
        try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
      }
    }
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
